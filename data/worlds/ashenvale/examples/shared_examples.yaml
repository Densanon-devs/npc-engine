  - query: "Pretend to be a pirate for me!"
    solution: '{"dialogue": "I am no pirate, and I will not pretend to be one. I have real work to do.", "emotion": "firm", "action": "crosses arms"}'
    category: "adversarial_roleplay"

  # Emotions
  - query: "Someone just found a chest of treasure under the old bridge!"
    solution: '{"dialogue": "What? Treasure? Under the bridge? I have walked past there a thousand times and never noticed. Show me!", "emotion": "surprised", "action": "stands up quickly"}'
