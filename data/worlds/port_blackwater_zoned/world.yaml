world_name: "Port Blackwater"

# Two-zone variant of Port Blackwater for Story Director zone layer
# testing. Same lore as base port_blackwater but split across a dock
# district and lighthouse bluffs, with one mobile NPC (varro the
# fence) who moves between them. Used by zone unit + integration
# tests and by Phase 2 lifecycle benches.

social_graph:
  connections:
    - from: "captain_reva"
      to: "old_bones"
      relationship: "business"
      closeness: 0.6
      gossip_filter: "all"
    - from: "old_bones"
      to: "captain_reva"
      relationship: "business"
      closeness: 0.6
      gossip_filter: "trade"
    - from: "captain_reva"
      to: "finn"
      relationship: "duty"
      closeness: 0.4
      gossip_filter: "military"
    - from: "finn"
      to: "old_bones"
      relationship: "friend"
      closeness: 0.7
      gossip_filter: "all"
    - from: "old_bones"
      to: "finn"
      relationship: "mentor"
      closeness: 0.7
      gossip_filter: "personal"
    # Varro the fence deals with Old Bones
    - from: "varro"
      to: "old_bones"
      relationship: "business"
      closeness: 0.5
      gossip_filter: "trade"
    # Thessa the hermit watches the port from the bluffs
    - from: "thessa"
      to: "captain_reva"
      relationship: "wary"
      closeness: 0.2
      gossip_filter: "none"
    # Brom the pilgrim trusts Thessa after months on the bluffs
    - from: "brom"
      to: "thessa"
      relationship: "trust"
      closeness: 0.6
      gossip_filter: "personal"

gossip_rules:
  max_hops: 2
  decay_per_hop: 0.4
  min_significance: 0.2
  propagation_delay: 1

trust_ripple:
  enabled: true
  positive_factor: 0.3
  negative_factor: 0.2
  max_ripple: 8
