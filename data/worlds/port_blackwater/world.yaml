# Port Blackwater — A pirate port town
# 3 NPCs with interconnected social dynamics

world_name: "Port Blackwater"

social_graph:
  connections:
    # Reva runs the port, Old Bones runs the tavern — business relationship
    - from: "captain_reva"
      to: "old_bones"
      relationship: "business"
      closeness: 0.6
      gossip_filter: "all"

    # Old Bones hears everything and tells Reva what matters
    - from: "old_bones"
      to: "captain_reva"
      relationship: "business"
      closeness: 0.6
      gossip_filter: "trade"

    # Finn works the docks for Reva
    - from: "captain_reva"
      to: "finn"
      relationship: "duty"
      closeness: 0.4
      gossip_filter: "military"

    # Finn eats at Old Bones' tavern, tells him dock gossip
    - from: "finn"
      to: "old_bones"
      relationship: "friend"
      closeness: 0.7
      gossip_filter: "all"

    # Old Bones looks out for Finn
    - from: "old_bones"
      to: "finn"
      relationship: "mentor"
      closeness: 0.7
      gossip_filter: "personal"

gossip_rules:
  max_hops: 2
  decay_per_hop: 0.4
  min_significance: 0.2
  propagation_delay: 1

trust_ripple:
  enabled: true
  positive_factor: 0.3
  negative_factor: 0.2
  max_ripple: 8
